# Suite Ulogix — dashboard + middleware.
# El broker MQTT y el servidor OPC UA YA existen (stack MES) — IPs reales
# solo en tu .env local (MQTT_HOST / OPCUA_ENDPOINT), nunca aqui.
# Los contenedores salen a esa IP directamente; recuerda que 'localhost' dentro
# de un contenedor NO es el host.
services:
  dashboard:
    build: .
    ports: ["8501:8501"]
    env_file: .env
    environment:
      - OPENBLAS_NUM_THREADS=1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
      - GOOGLE_SA_JSON=/run/secrets/google_service_account.json
    volumes:
      - ./data:/app/data              # datos + contabilidad local persistentes
      - ./middleware:/app/middleware  # state.db compartido con el middleware
      - ./config/google_service_account.json:/run/secrets/google_service_account.json:ro
    restart: unless-stopped

  middleware:
    build: .
    command: python middleware/run_middleware.py
    env_file: .env
    environment:
      - OPENBLAS_NUM_THREADS=1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
      - GOOGLE_SA_JSON=/run/secrets/google_service_account.json
    volumes:
      - ./data:/app/data
      - ./middleware:/app/middleware
      - ./config/google_service_account.json:/run/secrets/google_service_account.json:ro
    restart: unless-stopped
